name: Sync to Gitee

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitHub repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Gitee
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git remote add gitee https://oauth2:${{ secrets.GITEE_TOKEN }}@gitee.com/monaleesa77/hermes-dashboard.git
          git push gitee main --force
